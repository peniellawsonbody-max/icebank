version: '3.9'

services:

  db:
    image: mysql:8.0
    container_name: icebank_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: icebank2026
      MYSQL_DATABASE: icebank
      MYSQL_USER: icebank_user
      MYSQL_PASSWORD: icebank2026
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - icebank_network

  backend:
    build: ../projet/backend
    container_name: icebank_backend
    restart: always
    ports:
      - "8000:80"
    environment:
      APP_NAME: IceBank
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: icebank
      DB_USERNAME: icebank_user
      DB_PASSWORD: icebank2026
      OPENAI_API_KEY: your_openai_api_key_here
    depends_on:
      - db
    networks:
      - icebank_network

  redis:
    image: redis:alpine
    container_name: icebank_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - icebank_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: icebank_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: icebank_user
      PMA_PASSWORD: icebank2026
    depends_on:
      - db
    networks:
      - icebank_network

networks:
  icebank_network:
    driver: bridge

volumes:
  db_data:
